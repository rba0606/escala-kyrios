<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escala - Kyrios Festival</title>
    <style>
        :root {
            --cor-primaria: #b02e26;
            --cor-secundaria: #d4a017;
            --bg-gradiente: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
            
            /* Cores dos Turnos */
            --bg-t1: #fffdf2; /* Amarelo solar suave */
            --bg-t2: #fff5f0; /* Alaranjado entardecer */
            --bg-t3: #f0f4f8; /* Azul noite claro */
            --bg-t4: #f9f0ff; /* Roxo suave para o novo turno */
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; background: var(--bg-gradiente); color: #333;
        }

        h1 { color: var(--cor-primaria); font-size: 1.8rem; text-align: center; margin: 10px 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        p.instrucao { color: #666; margin-bottom: 20px; font-size: 0.9rem; text-align: center; font-style: italic; }
        
        .status-nuvem { 
            background: #fff; padding: 10px 20px; border-radius: 20px; 
            font-size: 12px; margin-bottom: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-weight: bold; color: #666; border: 1px solid #eee;
        }

        .painel { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 800px; }
        
        .turno { border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 6px solid var(--cor-primaria); }
        .turno h2 { margin-top: 0; color: var(--cor-primaria); font-size: 1.1rem; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px; }

        /* Classes de Cores por Turno */
        .turno-t1 { background-color: var(--bg-t1); }
        .turno-t2 { background-color: var(--bg-t2); }
        .turno-t3 { background-color: var(--bg-t3); }
        .turno-t4 { background-color: var(--bg-t4); }

        .caixas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 15px; }
        
        .caixa { 
            background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(0,0,0,0.05); padding: 15px 10px; border-radius: 8px; 
            text-align: center; border-left: 5px solid #ddd; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .caixa:hover { transform: translateY(-3px); box-shadow: 0 5px 10px rgba(0,0,0,0.08); border-color: var(--cor-secundaria); }
        
        .caixa small { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .caixa span { font-weight: bold; font-size: 1rem; color: #2c3e50; display: block; min-height: 1.2rem; }
        .vago { color: #bdc3c7 !important; font-style: italic; font-weight: normal !important; }

        @media (max-width: 600px) { .caixas-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <h1>🎸 Kyrios Festival</h1>
    <p class="instrucao">Toque no caixa para preencher ou alterar</p>
    <div class="status-nuvem" id="status">Sincronizando...</div>

    <div id="painelEscala" class="painel"></div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzosDRtHmaPqK1dckQNrEDOiqOwGqfwJ-20Ldh9QZiST45Nred4_5XTBiDGHtYeL-GN5w/exec";

    // Configuração atualizada para 4 turnos e 8 IDs por turno
    const config = {
        "T1": { ids: [1,2,3,4,5,6,7,8], label: "Turno 1: 14:00 às 16:00", css: "turno-t1" },
        "T2": { ids: [9,10,11,12,13,14,15,16], label: "Turno 2: 16:00 às 18:00", css: "turno-t2" },
        "T3": { ids: [17,18,19,20,21,22,23,24], label: "Turno 3: 18:00 às 20:00", css: "turno-t3" },
        "T4": { ids: [25,26,27,28,29,30,31,32], label: "Turno 4: 20:00 às 22:00", css: "turno-t4" }
    };

    // Lista de nomes atualizada para 8 caixas
    const nomesCaixas = ["Fixo 1", "Fixo 2", "Fixo 3", "Volante 1", "Volante 2", "Volante 3", "Volante 4", "Volante 5"];
    let nomesDB = {};

    async function loadData() {
        try {
            const res = await fetch(`${API_URL}?t=${new Date().getTime()}`);
            nomesDB = await res.json();
            document.getElementById('status').innerText = "✅ Atualizado: " + new Date().toLocaleTimeString();
            render();
        } catch (e) {
            document.getElementById('status').innerText = "⚠️ Erro de Conexão";
        }
    }

    function render() {
        const cont = document.getElementById('painelEscala');
        cont.innerHTML = '';
        for(let t in config) {
            let html = `<div class="turno ${config[t].css}"><h2>🕒 ${config[t].label}</h2><div class="caixas-grid">`;
            config[t].ids.forEach((id, i) => {
                const nome = nomesDB[id] || "";
                // Mantém a lógica visual: os 3 primeiros com cor primária, os demais com cor secundária
                html += `<div class="caixa" onclick="preencherVaga(${id}, '${nome}')" style="border-left-color: ${i<3?'#b02e26':'#d4a017'}">
                    <small>Caixa ${nomesCaixas[i]}</small>
                    <span class="${!nome?'vago':''}">${nome || 'Livre'}</span>
                </div>`;
            });
            cont.innerHTML += html + `</div></div>`;
        }
    }

    async function preencherVaga(id, nomeAtual) {
        if (nomeAtual) {
            const confirmar = confirm(`Esta vaga já está ocupada por "${nomeAtual}".\nDeseja alterar ou remover este nome?`);
            if (!confirmar) return;
        }

        const msg = nomeAtual ? `Editar nome:` : `Digite seu nome para este caixa:`;
        const novoNome = prompt(msg, nomeAtual);
        
        if (novoNome !== null) {
            await salvar(id, novoNome.trim());
        }
    }

    async function salvar(id, nome) {
        nomesDB[id] = nome;
        render();

        document.getElementById('status').innerText = "💾 Sincronizando...";

        try {
            await fetch(API_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({id, nome}) 
            });
            
            setTimeout(() => {
                document.getElementById('status').innerText = "✅ Sincronizado!";
                loadData(); 
            }, 1000);
        } catch(e) {
            alert("Erro ao salvar. Verifique sua conexão.");
            loadData(); 
        }
    }

    loadData();
    setInterval(loadData, 5000);
</script>
</body>
</html>
