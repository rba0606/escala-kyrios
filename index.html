<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala - Kyrios Festival</title>
    <style>
        :root {
            --cor-primaria: #b02e26;
            --cor-secundaria: #d4a017;
            --bg-gradiente: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradiente);
            color: #333;
        }

        h1 { color: var(--cor-primaria); font-size: 1.8rem; text-align: center; margin: 10px 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        p.data-evento { color: var(--cor-secundaria); margin-bottom: 20px; font-weight: bold; font-size: 1.1rem; text-align: center; }
        
        .status-nuvem { 
            background: #fff; padding: 10px 20px; border-radius: 20px; 
            font-size: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-weight: bold; color: #666; border: 1px solid #eee;
        }

        .painel { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 800px; }
        
        .turno { 
            background: #fff; border-radius: 12px; padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--cor-primaria); 
        }
        .turno h2 { margin-top: 0; color: var(--cor-primaria); font-size: 1.1rem; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .caixas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 15px; }
        
        .caixa { 
            background: #f9f9f9; border: 1px solid #eee; padding: 12px; border-radius: 8px; 
            text-align: center; cursor: pointer; transition: all 0.2s;
        }
        .caixa:hover { background: #fff; border-color: var(--cor-secundaria); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .caixa small { display: block; font-size: 0.65rem; color: #999; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .caixa span { font-weight: bold; font-size: 0.95rem; color: #2c3e50; display: block; min-height: 1.2rem; }
        .vago { color: #bdc3c7 !important; font-weight: normal !important; font-style: italic; }

        .tag-fixa { border-left: 4px solid var(--cor-primaria); }
        .tag-volante { border-left: 4px solid var(--cor-secundaria); }

        .cadastro { 
            background: #fff; padding: 20px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; 
            width: 100%; max-width: 400px; border: 1px solid #eee;
        }
        input, select, button { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; outline: none; box-sizing: border-box; }
        button { background: var(--cor-primaria); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #8e241d; }

        @media (max-width: 600px) { .caixas-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <h1>🎸 Kyrios Festival</h1>
    <p class="data-evento">Escala de Caixas | 25 de Abril</p>
    <div class="status-nuvem" id="status">Conectando...</div>

    <div class="cadastro">
        <input type="text" id="nomeInput" placeholder="Nome Completo">
        <select id="horaSelect">
            <option value="">Escolha o Turno</option>
            <option value="T1">13:30 às 16:30</option>
            <option value="T2">16:30 às 19:30</option>
            <option value="T3">19:30 às 22:30</option>
        </select>
        <button id="btnSalvar" onclick="cadastrarAuto()">Confirmar Vaga</button>
    </div>

    <div class="painel" id="painelEscala"></div>

<script>
    // IMPORTANTE: Insira sua URL do Apps Script abaixo
    const API_URL = "https://script.google.com/macros/s/AKfycbzosDRtHmaPqK1dckQNrEDOiqOwGqfwJ-20Ldh9QZiST45Nred4_5XTBiDGHtYeL-GN5w/exec";

    const config = {
        "T1": { label: "13:30 às 16:30", ids: [1,2,3,4,5,6,7] },
        "T2": { label: "16:30 às 19:30", ids: [8,9,10,11,12,13,14] },
        "T3": { label: "19:30 às 22:30", ids: [15,16,17,18,19,20,21] }
    };

    let nomesDB = {};

    async function loadData() {
        const status = document.getElementById('status');
        try {
            const response = await fetch(`${API_URL}?t=${new Date().getTime()}`);
            nomesDB = await response.json();
            renderPainel();
            status.innerText = "✅ Atualizado: " + new Date().toLocaleTimeString();
        } catch (e) {
            status.innerText = "⚠️ Modo Offline";
            renderPainel();
        }
    }

    function renderPainel() {
        const container = document.getElementById('painelEscala');
        container.innerHTML = '';
        for (let t in config) {
            let html = `<div class="turno"><h2>🕒 ${config[t].label}</h2><div class="caixas-grid">`;
            config[t].ids.forEach((id, index) => {
                // Termo atualizado para CAIXA
                const tipo = index < 3 ? "Caixa Fixo" : "Caixa Volante";
                const classe = index < 3 ? "tag-fixa" : "tag-volante";
                const nome = nomesDB[id] ? String(nomesDB[id]).trim() : "";
                html += `<div class="caixa ${classe}" onclick="editManual(${id},'${nome}')"><small>${tipo} ${index+1}</small><span class="${!nome?'vago':''}">${nome||'Livre'}</span></div>`;
            });
            container.innerHTML += html + `</div></div>`;
        }
    }

    async function cadastrarAuto() {
        const nome = document.getElementById('nomeInput').value.trim();
        const turno = document.getElementById('horaSelect').value;
        if(!nome || !turno) return alert("Preencha todos os campos!");
        const vago = config[turno].ids.find(id => !nomesDB[id]);
        if(!vago) return alert("Turno sem vagas!");
        await salvar(vago, nome);
    }

    async function editManual(id, atual) {
        // Termo atualizado para CAIXA
        const novo = prompt("Nome do Operador de Caixa:", atual === "Livre" ? "" : atual);
        if(novo !== null) await salvar(id, novo.trim());
    }

    async function salvar(id, nome) {
        document.getElementById('status').innerText = "💾 Salvando...";
        document.getElementById('btnSalvar').disabled = true;
        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({id, nome}) });
            setTimeout(() => {
                loadData();
                document.getElementById('btnSalvar').disabled = false;
                document.getElementById('nomeInput').value = '';
            }, 1200);
        } catch (e) {
            alert("Erro ao salvar.");
            document.getElementById('btnSalvar').disabled = false;
        }
    }

    loadData();
    setInterval(loadData, 30000);
</script>
</body>
</html>
