<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala - Kyrios Festival</title>
    <style>
        :root {
            --cor-primaria: #b02e26;
            --cor-secundaria: #d4a017;
            --bg-gradiente: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; background: var(--bg-gradiente); color: #333;
        }

        h1 { color: var(--cor-primaria); font-size: 1.8rem; text-align: center; margin: 10px 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        p.data-evento { color: var(--cor-secundaria); margin-bottom: 20px; font-weight: bold; font-size: 1.1rem; text-align: center; }
        
        .status-nuvem { 
            background: #fff; padding: 10px 20px; border-radius: 20px; 
            font-size: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-weight: bold; color: #666; border: 1px solid #eee;
        }

        .cadastro { 
            background: #fff; padding: 20px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; 
            width: 100%; max-width: 400px; border: 1px solid #eee;
        }

        input, select, button { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: var(--cor-primaria); color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }

        .painel { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 800px; }
        .turno { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--cor-primaria); }
        .caixas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 15px; }
        .caixa { background: #f9f9f9; border: 1px solid #eee; padding: 12px; border-radius: 8px; text-align: center; border-left: 4px solid #ddd; }
        .caixa small { display: block; font-size: 0.65rem; color: #999; text-transform: uppercase; font-weight: bold; }
        .caixa span { font-weight: bold; font-size: 0.95rem; color: #2c3e50; }
        .vago { color: #bdc3c7 !important; font-style: italic; }

        @media (max-width: 600px) { .caixas-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <h1>🎸 Kyrios Festival</h1>
    <p class="data-evento">Escala de Caixas | 25 de Abril</p>
    <div class="status-nuvem" id="status">Sincronizando...</div>

    <div class="cadastro">
        <input type="text" id="nomeInput" placeholder="Seu Nome">
        <select id="horaSelect" onchange="atualizarOpcoesCaixa()">
            <option value="">Escolha o Turno</option>
            <option value="T1">13:30 às 16:30</option>
            <option value="T2">16:30 às 19:30</option>
            <option value="T3">19:30 às 22:30</option>
        </select>
        <select id="caixaSelect">
            <option value="">Escolha o Caixa</option>
        </select>
        <button id="btnSalvar" onclick="cadastrarAuto()">Confirmar Vaga</button>
    </div>

    <div id="painelEscala" class="painel"></div>

<script>
    // ⚠️ COLOQUE SEU LINK ABAIXO
    const API_URL = "https://script.google.com/macros/s/AKfycbzosDRtHmaPqK1dckQNrEDOiqOwGqfwJ-20Ldh9QZiST45Nred4_5XTBiDGHtYeL-GN5w/exec";

    const config = {
        "T1": { ids: [1,2,3,4,5,6,7], label: "13:30 às 16:30" },
        "T2": { ids: [8,9,10,11,12,13,14], label: "16:30 às 19:30" },
        "T3": { ids: [15,16,17,18,19,20,21], label: "19:30 às 22:30" }
    };

    const nomesCaixas = ["Fixo 1", "Fixo 2", "Fixo 3", "Volante 1", "Volante 2", "Volante 3", "Volante 4"];
    let nomesDB = {};

    async function loadData() {
        try {
            const res = await fetch(API_URL);
            nomesDB = await res.json();
            document.getElementById('status').innerText = "✅ Online: " + new Date().toLocaleTimeString();
            render();
            atualizarOpcoesCaixa();
        } catch (e) {
            document.getElementById('status').innerText = "⚠️ Erro de Conexão";
        }
    }

    function atualizarOpcoesCaixa() {
        const turno = document.getElementById('horaSelect').value;
        const sel = document.getElementById('caixaSelect');
        sel.innerHTML = '<option value="">Escolha o Caixa</option>';
        if(!turno) return;

        config[turno].ids.forEach((id, i) => {
            const ocupado = nomesDB[id];
            const opt = document.createElement('option');
            opt.value = id;
            opt.text = nomesCaixas[i] + (ocupado ? ` (${ocupado})` : "");
            if(ocupado) opt.disabled = true;
            sel.appendChild(opt);
        });
    }

    function render() {
        const cont = document.getElementById('painelEscala');
        cont.innerHTML = '';
        for(let t in config) {
            let html = `<div class="turno"><h2>🕒 ${config[t].label}</h2><div class="caixas-grid">`;
            config[t].ids.forEach((id, i) => {
                const nome = nomesDB[id] || "";
                html += `<div class="caixa" style="border-left-color: ${i<3?'#b02e26':'#d4a017'}">
                    <small>Caixa ${nomesCaixas[i]}</small>
                    <span class="${!nome?'vago':''}">${nome || 'Livre'}</span>
                </div>`;
            });
            cont.innerHTML += html + `</div></div>`;
        }
    }

    async function cadastrarAuto() {
        const nome = document.getElementById('nomeInput').value.trim();
        const id = document.getElementById('caixaSelect').value;
        if(!nome || !id) return alert("Preencha nome e escolha o caixa!");

        document.getElementById('btnSalvar').disabled = true;
        document.getElementById('status').innerText = "💾 Gravando...";

        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({id, nome}) });
            setTimeout(() => {
                loadData();
                document.getElementById('btnSalvar').disabled = false;
                document.getElementById('nomeInput').value = "";
            }, 1500);
        } catch(e) {
            alert("Erro ao salvar");
            document.getElementById('btnSalvar').disabled = false;
        }
    }

    loadData();
    setInterval(loadData, 30000);
</script>
</body>
</html>
